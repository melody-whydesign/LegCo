<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Legislative Council Bookend 3D Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        /* Style the 3D viewer window */
        model-viewer {
            width: 80%;
            max-width: 800px;
            height: 500px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            --poster-color: transparent;
        }

        .instructions {
            margin-top: 15px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

    <h1>Hong Kong Legislative Council Bookend</h1>

    <model-viewer 
        src="hk-legco-bookend.glb" 
        alt="A cream-colored 3D model of the Hong Kong Legislative Council building bookend" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1" 
        exposure="1"
        interaction-prompt="auto">
    </model-viewer>

    <p class="instructions">🖱️ Left-click + drag to rotate | 📜 Scroll to zoom | ⚙️ Right-click + drag to pan</p>

</body>
</html>
