<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong LegCo Bookend - 3D Showcases</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f4f1ea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: #4a3e3d;
            margin-bottom: 5px;
            font-weight: 400;
            text-align: center;
        }

        p {
            color: #8c8275;
            margin-top: 0;
            margin-bottom: 40px;
            text-align: center;
        }

        .showcase-grid {
            display: flex;
            flex-direction: row;
            gap: 30px;
            width: 100%;
            max-width: 1400px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .model-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 15px;
            box-sizing: border-box;
            flex: 1;
            min-width: 320px;
            max-width: 650px;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .model-title {
            font-size: 16px;
            color: #5c504f;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .viewer-container {
            width: 100%;
            height: 450px;
            overflow: hidden;
            border-radius: 6px;
            background-color: #faf9f6;
        }

        .viewer-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <h1>Legislative Council Bookend Designs</h1>
    <p>Interactive 3D Model Viewers</p>

    <div class="showcase-grid">
        
        <!-- DESIGN ONE: DETAILED MOCKUP -->
        <div class="model-card">
            <div class="model-title">Option 1: Detailed Architectural Mockup</div>
            <div class="viewer-container">
                <iframe src="https://supavoxel.com/embed/cmrf5wimu0pqm8rmeru248asg" allowfullscreen></iframe>
            </div>
        </div>

        <!-- DESIGN TWO: SIMPLIFIED VERSION -->
        <div class="model-card">
            <div class="model-title">Option 2: Simplified Matte Mockup</div>
            <div class="viewer-container">
                <!-- Sandbox and security rules are added below to force SupaVoxel to bypass the load restriction natively -->
                <iframe src="https://supavoxel.com/embed/cmrf6csbt0psm8rmel2zdnw4x" sandbox="allow-scripts allow-same-origin allow-popups" allowfullscreen></iframe>
            </div>
        </div>

    </div>

</body>
</html>
