<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Legislative Council Bookend 3D Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            color: #1d1d1f;
            margin-bottom: 5px;
            font-weight: 600;
            text-align: center;
        }

        p.subtitle {
            color: #86868b;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 3D Viewer Container styling */
        model-viewer {
            width: 90%;
            max-width: 800px;
            height: 500px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --poster-color: transparent;
        }

        .instructions {
            margin-top: 20px;
            color: #6e6e73;
            font-size: 0.9rem;
            background: #e8e8ed;
            padding: 8px 16px;
            border-radius: 20px;
            text-align: center;
        }
    </style>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

    <h1>Hong Kong Legislative Council Building</h1>
    <p class="subtitle">Cream Colour Bookend 3D Preview</p>

    <model-viewer 
        src="./bookend.glb" 
        alt="A cream-colored 3D model of the Hong Kong Legislative Council building bookend" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1" 
        exposure="1"
        interaction-prompt="auto">
    </model-viewer>

    <p class="instructions">🖱️ Left-click + drag to rotate | 📜 Scroll to zoom | ⚙️ Right-click + drag to pan</p>

</body>
</html>
