<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong LegCo Bookend 3D Showcase</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f1ea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            color: #4a3e3d;
            margin-bottom: 5px;
            font-weight: 400;
        }

        p {
            color: #8c8275;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* Container for the 3D viewer */
        #viewer-container {
            width: 90%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            cursor: ew-resize; /* Changes cursor to a left-right arrow */
            user-select: none;
        }

        #bookend-image {
            width: 100%;
            height: auto;
            border-radius: 6px;
            pointer-events: none; /* Prevents dragging the image file itself */
        }

        .hint {
            font-size: 12px;
            color: #b5ada3;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Legislative Council Bookend</h1>
    <p>3D Perspective Showcase</p>

    <div id="viewer-container">
        <img id="bookend-image" src="images/frame1.jpg" alt="Bookend Perspective">
        <div class="hint">← Click and drag horizontally to rotate view →</div>
    </div>

    <script>
        // CONFIGURATION: Update these to match your images
        const totalFrames = 5; // Change this to the exact number of images you have
        const imageFolder = "images/";
        const imagePrefix = "frame";
        const imageExtension = ".jpg";

        // Array to store preloaded image paths
        const images = [];
        for (let i = 1; i <= totalFrames; i++) {
            images.push(`${imageFolder}${imagePrefix}${i}${imageExtension}`);
        }

        const container = document.getElementById('viewer-container');
        const viewImage = document.getElementById('bookend-image');
        
        let isDragging = false;
        let startX = 0;
        let currentFrameIndex = 0;
        const pixelsPerFrame = 50; // Controls rotation sensitivity. Lower = faster spin.

        // Mouse Events
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            handleMove(e.clientX);
        });

        // Touch Events for Mobile support
        container.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
        });

        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            handleMove(e.touches[0].clientX);
        });

        function handleMove(currentX) {
            const deltaX = currentX - startX;
            
            // Calculate how many frames to shift based on drag distance
            let frameOffset = Math.floor(deltaX / pixelsPerFrame);
            
            if (frameOffset !== 0) {
                // Update index and keep it within array bounds safely
                currentFrameIndex = (currentFrameIndex - frameOffset + totalFrames) % totalFrames;
                viewImage.src = images[currentFrameIndex];
                
                // Reset startX to the current position to continuously calculate smooth movement
                startX = currentX;
            }
        }
    </script>
</body>
</html>
