<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Legislative Council Bookend 3D Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            color: #1d1d1f;
            margin-bottom: 5px;
            font-weight: 600;
        }

        p.subtitle {
            color: #86868b;
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* Responsive container for the Tripo3D window */
        .viewer-container {
            width: 90%;
            max-width: 850px;
            height: 600px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden; /* Keeps the edges smooth and rounded */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .instructions {
            margin-top: 20px;
            color: #6e6e73;
            font-size: 0.9rem;
            background: #e8e8ed;
            padding: 8px 16px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <h1>Hong Kong Legislative Council Building</h1>
    <p class="subtitle">Cream Colour Bookend 3D Preview</p>

    <div class="viewer-container">
        <iframe 
            src="https://studio.tripo3d.ai/3d-model/5ca771c3-b2bf-4728-b807-6320b44366dc?invite_code=zPZkWa" 
            allow="fullscreen; vr; XR" 
            loading="lazy">
        </iframe>
    </div>

    <p class="instructions">🖱️ Use mouse or touch to rotate, zoom, and explore the 3D model</p>

</body>
</html>
