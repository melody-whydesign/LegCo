<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong LegCo Bookend Showcase</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f1ea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            color: #4a3e3d;
            margin-bottom: 5px;
            font-weight: 400;
        }

        p {
            color: #8c8275;
            margin-top: 0;
            margin-bottom: 20px;
        }

        #viewer-container {
            width: 90%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        #bookend-image {
            width: 100%;
            height: auto;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <h1>Legislative Council Bookend</h1>
    <p>3D Print Design Concept</p>

    <div id="viewer-container">
        <!-- Make sure your image name matches exactly what is inside the src="" below -->
        <img id="bookend-image" src="bookend.png" alt="Bookend Perspective">
    </div>

</body>
</html>
