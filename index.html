<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong LegCo Bookend - 3D Showcase</title>
    <!-- Import Google's <model-viewer> engine -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f4f1ea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: #4a3e3d;
            margin-bottom: 5px;
            font-weight: 400;
            text-align: center;
        }

        p {
            color: #8c8275;
            margin-top: 0;
            margin-bottom: 40px;
            text-align: center;
        }

        .showcase-grid {
            display: flex;
            flex-direction: row;
            gap: 30px;
            width: 100%;
            max-width: 900px;
            justify-content: center;
            box-sizing: border-box;
        }

        .model-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .model-title {
            font-size: 18px;
            color: #5c504f;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .viewer-container {
            width: 100%;
            height: 550px;
            overflow: hidden;
            border-radius: 6px;
            background-color: #faf9f6;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            --poster-color: transparent;
        }
    </style>
</head>
<body>

    <h1>Legislative Council Bookend Design</h1>
    <p>Interactive 3D Model Viewer</p>

    <div class="showcase-grid">
        
        <div class="model-card">
            <div class="model-title">Cream 3D Printed Model Preview</div>
            <div class="viewer-container">
                <!-- Using the local relative path so the browser doesn't block it -->
                <model-viewer 
                    src="model.glb" 
                    alt="Hong Kong LegCo Bookend 3D Model" 
                    camera-controls 
                    auto-rotate 
                    interaction-prompt="none"
                    touch-action="pan-y"
                    shadow-intensity="1"
                    shadow-softness="0.5">
                </model-viewer>
            </div>
        </div>

    </div>

</body>
</html>
